<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2F5233" />
    <title>SouTrilheiro</title>
    <link rel="apple-touch-icon" href="/icons/logo.jpeg" />
    <link rel="icon" type="image/jpeg" href="/icons/logo.jpeg" />
    <script>
      (function () {
        var salvo = localStorage.getItem('soutrilheiro_tema');
        var tema = salvo === 'light' || salvo === 'dark'
          ? salvo
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', tema);
      })();
    </script>
    <script>
      // Reidrata a rota original após o redirecionamento feito por 404.html (GitHub Pages).
      // https://github.com/rafgraph/spa-github-pages
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
