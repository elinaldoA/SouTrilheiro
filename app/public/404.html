<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>SouTrilheiro</title>
    <script>
      // Truque de SPA para GitHub Pages: converte a rota em query string
      // e redireciona para index.html, que devolve a rota original.
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // mantém /SouTrilheiro no path
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
